          Description: Percentage of total L2 sector accesses that hit
          Value: 53.7529
    - Name: Warp Stalled by No Instruction
      Category: SM Warp Latency
      Explanation: Percentage of cumulative warp cycles for warps waiting to be selected for instruction fetch, or waiting on an instruction cache miss.
      Suggestion: "Reducing the number of SASS instructions per shader may help (for instance, by not unrolling certain loops).  \nReducing the number of active shaders may help (for instance, by doing lighting in a raygen shader instead of in hit shaders).  \nReducing ray-latency divergence may help, for instance by shortening rays and falling back to IBL (see SIGGRAPH 2020 talk: https://developer.nvidia.com/siggraph/2020/video/sigg01).  \nNote: As long as the instructions that are never hit are in large chunks, they should not take up space in the SM instruction cache."
