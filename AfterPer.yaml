      Explanation: "If the L1TEX hit rate is poor, it causes more requests to go to the L2 cache.  \nIf the L2 hit rate is poor, it causes more requests to go to VRAM.  \nA poor L2 hit rate is typically caused by the working set size of the GPU workload exceeding the L2 cache capacity."
      Suggestion: "If the L1TEX hit rate is poor, the following changes may help:\n- Enabling mipmapping and/or fetching coarser mip levels\n- Using a smaller texture format (e.g. FP16 depths instead of FP32)\n- Making adjacent pixels fetch closer texels in memory\n- For PSs, increasing the triangle size if some triangles are sub-pixel\n- For PSs, converting the PS to a CS and tweaking the thread group size\n- For CSs, increasing the thread group size (see SIGGRAPH 2020 talk: https://developer.nvidia.com/siggraph/2020/video/sigg01)\n- For CSs, if no async-compute queue is used, reducing the amount of allocated shared memory\nIf the L2 hit rate is poor:\n  \n  - For CSs with 2D thread groups, thread group ID swizzling may help (see https://developer.nvidia.com/blog/optimizing-compute-shaders-for-l2-locality-using-thread-group-id-swizzling/).\n  - In all cases, fetching 2D textures using a larger LOD bias (to fetch coarser mip levels) may help."
