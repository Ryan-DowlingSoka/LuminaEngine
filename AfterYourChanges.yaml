          Description: PCIe Throughput
          Value: 7.8410
        - Name: L2 Throughput [%]
          Id: lts__throughput.avg.pct_of_peak_sustained_elapsed
          Description: LTS throughput
          Value: 6.9078
        - Name: ZROP Throughput [%]
          Id: zrop__throughput.avg.pct_of_peak_sustained_elapsed
          Description: ZROP throughput
          Value: 6.5469
        - Name: VRAM Throughput [%]
          Id: dramc__throughput.avg.pct_of_peak_sustained_elapsed
          Description: DRAMC Throughput
          Value: 1.6512
    - Name: L2 Misses in System Memory
      Category: PCIe
      Explanation: "% of the L2 cycles with a pending miss in System Memory.  \nL2 misses to System Memory (aka CPU memory) have a much higher latency than misses to VRAM."
      Suggestion: "On DX11: Changing DYNAMIC (system memory) resources to DEFAULT (VRAM) resources may help.  \nOn DX12: Changing UPLOAD heaps (or POOL_L0 heaps) to CPU-Visible VRAM (via NVAPI) may help. See https://developer.nvidia.com/blog/optimizing-dx12-resource-uploads-to-the-gpu-using-cpu-visible-vram/."
      Metrics:
