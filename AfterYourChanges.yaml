    - Name: FE Go-Idle Cycles Async Queue
      Category: Wait for Idles
      Explanation: "Go-Idle commands in an async-COMPUTE queue may be caused by changes of shader-visible descriptor heaps.  \nCopy commands in an async-COMPUTE queue from/to system memory (aka CPU memory) may produce a Go-Idle command."
      Suggestion: "* Do not change the shader-visible descriptor heap (SetDescriptorHeaps with a different heap) in an async-COMPUTE queue.\n* Do not use DX12 Copy commands to copy from/to system memory in an async-COMPUTE queue, but:\n  - Use Dispatch commands to perform such copies, or\n  - Move such Copy commands to a DIRECT or async-COPY queue, or\n  - If possible, write directly to CPU-Visible VRAM using NVAPI (without using a DX12 Copy)."
