      Suggestion: "Run the Shader Profiler and locate which HLSL/GLSL instructions are causing most long_scoreboard stalls on their dependent instructions.  \n* Try better hiding the latency of the L1TEX instructions:  \n  - With other math instructions: try hoisting L1TEX instructions (i.e.: prefetch: move the texture fetches so they happen earlier in the program)  \n  - With other L1TEX instructions: try batching likely hits (e.g. by grouping independent texture fetches in batches of 2 to 4 back-to-back instructions at the HLSL level)  \n  - Removing unnecessary control flow that prevents L1TEX instructions from being batched\n* Try reducing the latencies of the L1TEX instructions:  \n  - Consider using more compact texture formats and/or reducing texture sizes  \n  - Consider using Buffer SRV Loads instead of Buffer UAV Loads  \n  - Consider increasing the L1TEX and L2 hit rates (see the L1TEX L2 section)"
